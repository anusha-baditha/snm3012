 {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
      <center style="color: rgb(150, 19, 113);">{{ message }}</center>
    {% endfor %}
    {% endif %}
    {% endwith %}

    </center>
