{% extends 'dashboard.html' %}

    {% block title %}<title>Add Notes</title>{% endblock %}

    {% block addcss %}<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='addnotes.css') }}">{% endblock %}
{% block content %}
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-7">

            <div class="note-card">

                <div class="card-header-custom">
                    <h2>Add New Note</h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Title</label>

                            <input
                                type="text"
                                class="form-control"
                                name="title"
                                placeholder="Enter note title"
                                required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description</label>

                            <textarea
                                class="form-control"
                                rows="6"
                                name="description"
                                placeholder="Write your note..."
                                required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                                Back
                            </a>

                            <button class="btn btn-primary">
                                Save Note
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>



{% endblock %}
