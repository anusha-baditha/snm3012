<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }

        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
            text-align: center;
        }

        input {
            width: 220px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>OTP Verification</h2>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
      <center style="color: aqua;">{{ message }}</center>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="post">
        <input
            type="text"
            name="otp"
            maxlength="6"
            pattern="[A-Z][0-9][a-z][A-Z][0-9][a-z]"
            title="Format: Uppercase, Number, Lowercase, Uppercase, Number, Lowercase"
            required>
        <br>
        <button type="submit">Verify OTP</button>
    </form>
</div>

</body>
</html>
